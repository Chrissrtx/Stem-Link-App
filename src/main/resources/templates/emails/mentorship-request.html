<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Solicitud de Mentoría</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .header { background-color: #007bff; color: white; padding: 10px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .footer { font-size: 0.8em; text-align: center; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>STEM Link</h2>
        </div>
        <div class="content">
            <p>Hola <span th:text="${mentorName}">Mentor</span>,</p>
            <p>Tienes una nueva solicitud de mentoría de <strong><span th:text="${studentName}">Estudiante</span></strong>.</p>
            <p><strong>Detalles de la sesión:</strong></p>
            <ul>
                <li>Fecha: <span th:text="${date}">2026-05-24</span></li>
                <li>Horario: <span th:text="${startTime}">15:00</span> - <span th:text="${endTime}">16:00</span></li>
            </ul>
            <p>Por favor, ingresa a la plataforma para confirmar o cancelar esta solicitud.</p>
        </div>
        <div class="footer">
            Este es un correo automático, por favor no respondas.
        </div>
    </div>
</body>
</html>
