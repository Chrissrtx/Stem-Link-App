<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reserva Confirmada</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .header { background-color: #17a2b8; color: white; padding: 10px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .footer { font-size: 0.8em; text-align: center; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>¡Tu sesión ha sido confirmada!</h2>
        </div>
        <div class="content">
            <p>Hola <span th:text="${userName}">Estudiante</span>,</p>
            <p>Tu mentor ha confirmado la sesión de mentoría.</p>
            <p><strong>Detalles:</strong></p>
            <ul>
                <li>Mentor: <span th:text="${mentorName}">Nombre del Mentor</span></li>
                <li>Fecha: <span th:text="${date}">2026-05-24</span></li>
                <li>Horario: <span th:text="${startTime}">15:00</span> - <span th:text="${endTime}">16:00</span></li>
            </ul>
            <p>¡Prepárate para tu sesión!</p>
        </div>
        <div class="footer">
            STEM Link - Sistema de Notificaciones.
        </div>
    </div>
</body>
</html>
