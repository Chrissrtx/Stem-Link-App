<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sesión Cancelada</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .header { background-color: #dc3545; color: white; padding: 10px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .footer { font-size: 0.8em; text-align: center; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Notificación de Cancelación</h2>
        </div>
        <div class="content">
            <p>Hola,</p>
            <p>Te informamos que la sesión programada para el día <strong><span th:text="${date}">2026-05-24</span></strong> a las <strong><span th:text="${startTime}">15:00</span></strong> ha sido <strong>cancelada</strong>.</p>
            <p>Si tienes dudas, puedes ponerte en contacto a través de la plataforma.</p>
        </div>
        <div class="footer">
            STEM Link - Sistema de Notificaciones.
        </div>
    </div>
</body>
</html>
