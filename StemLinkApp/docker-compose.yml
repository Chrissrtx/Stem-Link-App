services:
  db:
    image: postgres:15-alpine
    container_name: stemlink-db
    environment:
      POSTGRES_DB: stemlink_db
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: password1
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: stemlink-app
    ports:
      - "8080:8080"
    depends_on:
      - db
volumes:
  postgres_data: