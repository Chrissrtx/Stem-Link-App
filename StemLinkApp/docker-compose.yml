services:
  db:
    image: postgres:15-alpine
    container_name: stemlink-db
    environment:
      POSTGRES_DB: stemlink_db
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: password1
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: